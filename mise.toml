[tools]
# Bun version should be kept in sync with GitHub Actions workflows
bun = "1.2.22"
# Deno version should be kept in sync with GitHub Actions workflows
deno = "2.5.6"
node = "22"
"npm:pnpm" = "latest"

[tasks.check]
description = "Check code formatting, linting, and type checking"
run = "deno task check-all"
